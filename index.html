<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💍 Boda Kary & Fer — Acceso</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap');
    :root {
      --gold: #B8966E; --gold-light: #D4B48A; --dark: #1A1410;
      --cream: #FAF7F2; --green: #2D6A4F; --red: #8B2020;
      --gray: #6B6560; --border: #E8E0D5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }
    header { background: var(--dark); padding: 18px 20px 14px; text-align: center; }
    header h1 { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 1.5rem; font-weight: 600; letter-spacing: 0.04em; }
    header p { color: #9A8E84; font-size: 0.72rem; margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }
    .container { max-width: 480px; margin: 0 auto; padding: 24px 16px; }
    .search-section { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
    .search-section label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
    .search-row { display: flex; gap: 8px; }
    .search-row input { flex: 1; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: 'Inter', sans-serif; background: var(--cream); color: var(--dark); outline: none; transition: border-color 0.2s; }
    .search-row input:focus { border-color: var(--gold); }
    .search-row button { padding: 12px 18px; background: var(--dark); color: var(--gold); border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
    .guest-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; display: none; }
    .guest-card.visible { display: block; }
    .card-header { background: var(--dark); padding: 20px; display: flex; align-items: center; gap: 16px; }
    .avatar { width: 52px; height: 52px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--dark); font-weight: 600; flex-shrink: 0; }
    .card-header-info h2 { font-family: 'Cormorant Garamond', serif; color: white; font-size: 1.3rem; font-weight: 600; line-height: 1.2; }
    .card-header-info span { font-size: 0.72rem; color: var(--gold-light); letter-spacing: 0.08em; text-transform: uppercase; }
    .status-badge { margin-left: auto; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0; }
    .status-CONFIRMADO { background: #1A3D2B; color: #5CCC8A; }
    .status-PENDIENTE  { background: #3D2E0A; color: #D4A844; }
    .status-DECLINO    { background: #3D0A0A; color: #CC5C5C; }
    .card-body { padding: 20px; display: grid; gap: 14px; }
    .info-row { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--cream); border-radius: 8px; }
    .info-icon { font-size: 1.4rem; flex-shrink: 0; }
    .info-label { font-size: 0.7rem; font-weight: 600; color: var(--gray); letter-spacing: 0.06em; text-transform: uppercase; }
    .info-value { font-size: 1rem; font-weight: 600; color: var(--dark); margin-top: 1px; }
    .tickets-value { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: var(--gold); line-height: 1; }
    .checkin-section { padding: 0 20px 20px; }
    .checkin-btn { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .checkin-done { text-align: center; padding: 14px; background: #EBF7F1; border-radius: 10px; border: 1.5px solid #5CCC8A; }
    .checkin-done p { color: var(--green); font-weight: 600; font-size: 0.95rem; }
    .checkin-done small { color: var(--gray); font-size: 0.78rem; }
    .error-card { background: white; border-radius: 12px; border: 1.5px solid #E8C4C4; padding: 24px; text-align: center; display: none; }
    .error-card.visible { display: block; }
    .error-card h3 { color: var(--red); margin-bottom: 6px; }
    .error-card p { color: var(--gray); font-size: 0.88rem; }
    .loading { text-align: center; padding: 32px; color: var(--gray); display: none; }
    .loading.visible { display: block; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .log-section { margin-top: 28px; background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .log-section h3 { padding: 14px 16px; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray); border-bottom: 1px solid var(--border); }
    .log-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .log-table th { padding: 8px 12px; text-align: left; color: var(--gray); font-weight: 600; font-size: 0.72rem; }
    .log-table td { padding: 10px 12px; border-top: 1px solid var(--border); }
    .debug-box { background: #1A1410; color: #B8966E; font-size: 0.75rem; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-family: monospace; line-height: 1.6; display: none; }
    .debug-box.visible { display: block; }
  </style>
</head>
<body>
<header>
  <h1>💍 Boda Kary &amp; Fer</h1>
  <p>Control de accesos</p>
</header>
<div class="container">

  <div class="debug-box" id="debugBox"></div>

  <div class="search-section">
    <label>Buscar invitado</label>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Nombre o grupo…" autocomplete="off" />
      <button onclick="buscarInvitado()">Buscar</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Consultando lista…</p>
  </div>

  <div class="error-card" id="errorCard">
    <h3>⚠️ No encontrado</h3>
    <p id="errorMsg">Verifica el nombre o el código QR.</p>
  </div>

  <div class="guest-card" id="guestCard">
    <div class="card-header">
      <div class="avatar" id="avatarText">KF</div>
      <div class="card-header-info">
        <h2 id="guestName">—</h2>
        <span id="guestGroup">Grupo —</span>
      </div>
      <div class="status-badge" id="statusBadge">—</div>
    </div>
    <div class="card-body">
      <div class="info-row">
        <div class="info-icon">🪑</div>
        <div><div class="info-label">Mesa</div><div class="info-value" id="mesaVal">—</div></div>
      </div>
      <div class="info-row">
        <div class="info-icon">🏨</div>
        <div><div class="info-label">Habitación</div><div class="info-value" id="habVal">—</div></div>
      </div>
      <div class="info-row">
        <div class="info-icon">🎟️</div>
        <div><div class="info-label">Boletos del grupo</div><div class="tickets-value" id="boletosVal">—</div></div>
      </div>
    </div>
    <div class="checkin-section">
      <button class="checkin-btn" id="checkinBtn" onclick="registrarCheckin()">✅ Registrar llegada</button>
      <div class="checkin-done" id="checkinDone" style="display:none">
        <p>✅ Check-in registrado</p>
        <small id="checkinTime"></small>
      </div>
    </div>
  </div>

  <div class="log-section" id="logSection" style="display:none">
    <h3>📋 Llegadas registradas esta sesión</h3>
    <table class="log-table">
      <thead><tr><th>Invitado</th><th>Mesa</th><th>Hora</th></tr></thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>

</div>

<script>
  // ══════════════════════════════════════════════════
  //  CONFIGURACIÓN — YA CONECTADA CON TUS DATOS REALES
  // ══════════════════════════════════════════════════
  const SHEET_ID   = '1qhLIAERZbi4wQTAaf_ykPLgtWvFV-hbkCl5PfvSv5rA';
  const SHEET_GID  = '1089627893';   // pestaña exacta de tu hoja
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxVL_dtUN85yRqzug_RGBprEzT9p4BLjOxudlbPVaXpdMj9pq4y5_zMtiXBQulBx3pR/exec';
  // ══════════════════════════════════════════════════

  let todosLosInvitados = [];
  let invitadoActual = null;
  const checkinLog = [];

  function debug(msg) {
    const box = document.getElementById('debugBox');
    box.classList.add('visible');
    box.innerHTML += msg + '<br>';
  }

  // Leer parámetro ?q= de la URL (viene del QR)
  window.addEventListener('load', () => {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
      document.getElementById('searchInput').value = decodeURIComponent(q);
    }
    cargarDatos();
  });

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscarInvitado();
  });

  async function cargarDatos() {
    document.getElementById('loading').classList.add('visible');

    // Intentar con gid (número de pestaña) primero
    const urlGid = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
    // Fallback por nombre
    const urlNombre = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let ok = false;
    for (const url of [urlGid, urlNombre]) {
      try {
        const res = await fetch(url);
        if (!res.ok) { debug('HTTP error ' + res.status); continue; }
        const text = await res.text();

        // La respuesta de Google viene envuelta: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
        // Extraer el JSON limpiamente
        const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
        if (!match) { debug('No se pudo parsear respuesta de Sheets'); continue; }
        const json = JSON.parse(match[1]);

        if (!json.table || !json.table.rows) { debug('Tabla vacía o sin acceso'); continue; }

        const cols = json.table.cols.map(c => c.label || c.id);
        debug('Columnas detectadas: ' + cols.join(' | '));

        todosLosInvitados = json.table.rows
          .filter(r => r.c && r.c.some(c => c && c.v))
          .map(r => {
            const obj = {};
            cols.forEach((col, i) => {
              obj[col] = (r.c[i] && r.c[i].v !== null && r.c[i].v !== undefined) ? String(r.c[i].v).trim() : '';
            });
            return obj;
          });

        debug('Registros cargados: ' + todosLosInvitados.length);
        ok = true;
        break;
      } catch(e) {
        debug('Error fetch: ' + e.message);
      }
    }

    document.getElementById('loading').classList.remove('visible');

    if (!ok) {
      mostrarError('No se pudo conectar con la lista. Verifica que la hoja esté en modo público para lectura.');
      return;
    }

    // Si había un ?q= esperando, buscarlo ahora
    const q = document.getElementById('searchInput').value.trim();
    if (q) buscarInvitado();
  }

  function buscarInvitado() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!query) return;
    ocultarResultado();

    if (todosLosInvitados.length === 0) {
      mostrarError('La lista no está cargada todavía. Espera un momento o recarga la página.');
      return;
    }

    // Buscar en TODAS las columnas de texto para mayor tolerancia
    const encontrado = todosLosInvitados.find(inv =>
      Object.values(inv).some(v => v.toLowerCase().includes(query))
    );

    if (!encontrado) {
      mostrarError(`No se encontró "${query}". Prueba con otra parte del nombre.`);
      debug('Primeros 3 registros: ' + JSON.stringify(todosLosInvitados.slice(0,3)));
      return;
    }

    // Buscar todos los miembros del mismo grupo
    const grupoId = encontrado['Grupo'] || encontrado[Object.keys(encontrado)[0]];
    const grupoKey = Object.keys(encontrado).find(k => k.toLowerCase().includes('grupo')) || 'Grupo';
    const miembros = todosLosInvitados.filter(i => i[grupoKey] === encontrado[grupoKey]);

    invitadoActual = encontrado;
    mostrarTarjeta(encontrado, miembros);
  }

  function mostrarTarjeta(inv, grupo) {
    // Detectar claves de columna flexiblemente
    const keys = Object.keys(inv);
    const get = (...posibles) => {
      for (const p of posibles) {
        const k = keys.find(k => k.toLowerCase().replace(/\s/g,'').includes(p.toLowerCase().replace(/\s/g,'')));
        if (k && inv[k]) return inv[k];
      }
      return '';
    };

    const nombre = get('nombrecorto','nombreinvitado','nombre') || '?';
    const grupo_id = get('grupo') || '?';
    const mesa = get('numeromesa','mesa') || '';
    const habitacion = get('habitación','habitacion') || '';
    const boletos = get('boletos') || grupo.length;
    const respuesta = get('respuesta') || '';

    document.getElementById('avatarText').textContent = nombre.substring(0,2).toUpperCase();
    document.getElementById('guestName').textContent = nombre;
    document.getElementById('guestGroup').textContent = `Grupo ${grupo_id} · ${grupo.length} persona${grupo.length>1?'s':''}`;

    const badgeClass = (respuesta || 'PENDIENTE').replace(/\s/g,'-').toUpperCase();
    const badge = document.getElementById('statusBadge');
    badge.textContent = respuesta || 'PENDIENTE';
    badge.className = `status-badge status-${badgeClass}`;

    const mesaTexto = (!mesa || mesa.toLowerCase().includes('pendiente')) ? '⏳ Por asignar' : mesa;
    document.getElementById('mesaVal').textContent = mesaTexto;
    document.getElementById('habVal').textContent = habitacion || 'Sin habitación reservada';
    document.getElementById('boletosVal').textContent = boletos;

    const yaCheckin = checkinLog.find(l => l.grupo === grupo_id);
    if (yaCheckin) {
      mostrarCheckinHecho(yaCheckin.hora);
    } else {
      document.getElementById('checkinBtn').style.display = 'flex';
      document.getElementById('checkinDone').style.display = 'none';
    }

    document.getElementById('guestCard').classList.add('visible');
  }

  function registrarCheckin() {
    const ahora = new Date();
    const hora = ahora.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
    const keys = Object.keys(invitadoActual);
    const get = (...posibles) => {
      for (const p of posibles) {
        const k = keys.find(k => k.toLowerCase().replace(/\s/g,'').includes(p.toLowerCase().replace(/\s/g,'')));
        if (k && invitadoActual[k]) return invitadoActual[k];
      }
      return '';
    };
    const nombre = get('nombrecorto','nombreinvitado','nombre');
    const mesa = get('numeromesa','mesa') || 'Por asignar';
    const grupo = get('grupo') || '?';

    checkinLog.unshift({ nombre, mesa, hora, grupo });
    mostrarCheckinHecho(hora);
    actualizarLog();

    // Enviar al Apps Script
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, mesa, hora, fecha: ahora.toLocaleDateString('es-MX') })
    }).catch(() => {});
  }

  function mostrarCheckinHecho(hora) {
    document.getElementById('checkinBtn').style.display = 'none';
    document.getElementById('checkinDone').style.display = 'block';
    document.getElementById('checkinTime').textContent = `Hora de llegada: ${hora}`;
  }

  function actualizarLog() {
    document.getElementById('logSection').style.display = 'block';
    document.getElementById('logBody').innerHTML = checkinLog.map(l =>
      `<tr><td><strong>${l.nombre}</strong></td><td>${l.mesa}</td><td>${l.hora}</td></tr>`
    ).join('');
  }

  function ocultarResultado() {
    document.getElementById('guestCard').classList.remove('visible');
    document.getElementById('errorCard').classList.remove('visible');
  }

  function mostrarError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorCard').classList.add('visible');
  }
</script>
</body>
</html>

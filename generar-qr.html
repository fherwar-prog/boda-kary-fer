<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💍 Boda Kary & Fer — Generador de QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap');
    :root { --gold:#B8966E; --dark:#1A1410; --cream:#FAF7F2; --border:#E8E0D5; --gray:#6B6560; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',sans-serif; background:#F0EDE8; color:var(--dark); }

    header { background:var(--dark); padding:20px; text-align:center; }
    header h1 { font-family:'Cormorant Garamond',serif; color:var(--gold); font-size:1.6rem; }
    header p { color:#9A8E84; font-size:0.75rem; margin-top:4px; letter-spacing:0.08em; text-transform:uppercase; }

    .toolbar { background:white; padding:16px 24px; display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; border-bottom:1px solid var(--border); }
    .toolbar .field { display:flex; flex-direction:column; gap:4px; flex:1; min-width:260px; }
    .toolbar label { font-size:0.78rem; color:var(--gray); font-weight:600; letter-spacing:0.04em; }
    .toolbar input { padding:9px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:0.9rem; font-family:'Inter',sans-serif; }
    .btn { padding:10px 20px; background:var(--dark); color:var(--gold); border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:0.88rem; white-space:nowrap; }
    .btn.sec { background:var(--cream); color:var(--dark); border:1.5px solid var(--border); }
    .btn.green { background:#2D6A4F; color:white; }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:20px; padding:24px; max-width:1100px; margin:0 auto; }

    .qr-card { background:white; border-radius:14px; border:1px solid var(--border); padding:20px; text-align:center; }
    .qr-card .nombre { font-family:'Cormorant Garamond',serif; font-size:1.15rem; font-weight:600; color:var(--dark); margin-bottom:2px; }
    .qr-card .meta { font-size:0.72rem; color:var(--gray); margin-bottom:12px; }
    .qr-card .qr-wrap { display:flex; justify-content:center; margin-bottom:12px; }
    .qr-card canvas, .qr-card img { border-radius:6px; }
    .qr-card .data-row { display:flex; justify-content:space-between; padding:5px 0; border-top:1px solid var(--border); font-size:0.78rem; }
    .qr-card .data-row:first-of-type { margin-top:8px; }
    .qr-card .dk { color:var(--gray); }
    .qr-card .dv { font-weight:600; }

    /* Botón de descarga individual */
    .dl-btn {
      margin-top:12px;
      width:100%;
      padding:9px;
      background:var(--dark);
      color:var(--gold);
      border:none;
      border-radius:8px;
      font-size:0.82rem;
      font-weight:600;
      cursor:pointer;
      font-family:'Inter',sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }
    .dl-btn:hover { opacity:0.85; }

    .empty { text-align:center; padding:60px; color:var(--gray); }
    .info-box { margin:16px 24px; background:#FFF8E8; border:1px solid #E8CC88; border-radius:10px; padding:14px 18px; font-size:0.83rem; color:#6B5500; line-height:1.6; max-width:700px; }
    .info-box strong { color:#4A3800; }
    .contador { padding:10px 24px 0; color:var(--gray); font-size:0.82rem; max-width:1100px; margin:0 auto; }

    @media print {
      header,.toolbar,.info-box,.dl-btn,.contador { display:none; }
      body { background:white; }
      .grid { padding:0; gap:10px; }
      .qr-card { border:1px solid #ccc; break-inside:avoid; }
    }
  </style>
</head>
<body>

<header>
  <h1>💍 Generador de QR</h1>
  <p>Boda Kary &amp; Fer — Control de accesos</p>
</header>

<div class="info-box">
  <strong>📲 Nuevo:</strong> Cada QR tiene un botón <strong>⬇ Descargar</strong> para guardar la imagen y mandarla por WhatsApp individualmente.
  También puedes usar <strong>⬇ Descargar todos</strong> para obtener todos los QR de una vez.
</div>

<div class="toolbar">
  <div class="field">
    <label>URL base de tu app (GitHub Pages)</label>
    <input type="text" id="baseUrl" placeholder="https://tuusuario.github.io/boda-kary-fer/?q=" />
  </div>
  <label style="cursor:pointer; display:flex; flex-direction:column; gap:4px;">
    <span style="font-size:0.78rem;color:var(--gray);font-weight:600;">Cargar CSV de Google Sheets</span>
    <button class="btn sec" onclick="document.getElementById('fileInput').click()">📂 Cargar CSV</button>
    <input type="file" id="fileInput" accept=".csv" style="display:none" onchange="cargarCSV(event)" />
  </label>
  <button class="btn" onclick="generarQRs()">✨ Generar QR</button>
  <button class="btn sec" onclick="window.print()">🖨️ Imprimir todos</button>
  <button class="btn green" id="dlTodosBtn" onclick="descargarTodos()" style="display:none">⬇ Descargar todos</button>
</div>

<div class="contador" id="contador"></div>
<div class="grid" id="qrGrid">
  <div class="empty">
    <p style="font-size:2rem">📱</p>
    <p style="margin-top:8px">Ingresa la URL de tu app y presiona <strong>Generar QR</strong></p>
  </div>
</div>

<script>
// ── Canvas oculto para componer imagen con nombre ──────────────────────────
// Genera un PNG con el QR + nombre del invitado, listo para WhatsApp
function generarImagenConNombre(canvasQR, nombre, grupo) {
  const pad = 20;
  const qrSize = canvasQR.width;
  const headerH = 52;
  const footerH = 36;
  const totalW = qrSize + pad * 2;
  const totalH = headerH + qrSize + footerH + pad;

  const c = document.createElement('canvas');
  c.width = totalW;
  c.height = totalH;
  const ctx = c.getContext('2d');

  // Fondo crema
  ctx.fillStyle = '#FAF7F2';
  ctx.fillRect(0, 0, totalW, totalH);

  // Encabezado oscuro
  ctx.fillStyle = '#1A1410';
  ctx.fillRect(0, 0, totalW, headerH);

  // Título en dorado
  ctx.fillStyle = '#B8966E';
  ctx.font = 'bold 15px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('💍 Boda Kary & Fer', totalW / 2, 22);

  // Nombre del invitado
  ctx.fillStyle = '#FAF7F2';
  ctx.font = '600 13px Inter, Arial, sans-serif';
  ctx.fillText(nombre, totalW / 2, 42);

  // QR
  ctx.drawImage(canvasQR, pad, headerH, qrSize, qrSize);

  // Pie
  ctx.fillStyle = '#6B6560';
  ctx.font = '11px Inter, Arial, sans-serif';
  ctx.fillText(`Grupo ${grupo} · Escanea para ver tu información`, totalW / 2, headerH + qrSize + 22);

  // Borde decorativo dorado
  ctx.strokeStyle = '#B8966E';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, totalW - 2, totalH - 2);

  return c;
}

function descargarCanvas(canvas, nombre) {
  const link = document.createElement('a');
  link.download = `QR_${nombre.replace(/\s/g, '_')}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── Datos de demo ──────────────────────────────────────────────────────────
const DATOS_DEMO = [
  { grupo:'1',  nombre:'Flor',    boletos:2, habitacion:'CASCO 15-16', mesa:'Por asignar', respuesta:'CONFIRMADO' },
  { grupo:'2',  nombre:'Hermana', boletos:4, habitacion:'CASCO 15-16', mesa:'Por asignar', respuesta:'CONFIRMADO' },
  { grupo:'3',  nombre:'Oscar',   boletos:2, habitacion:'',            mesa:'Por asignar', respuesta:'PENDIENTE'  },
  { grupo:'5',  nombre:'Crazy',   boletos:2, habitacion:'LEO',         mesa:'Por asignar', respuesta:'CONFIRMADO' },
  { grupo:'27', nombre:'Mamá',    boletos:2, habitacion:'VILLA PB',    mesa:'Por asignar', respuesta:'CONFIRMADO' },
];

let datosActuales = [];
const canvasMap = {}; // grupo → canvas compuesto

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (const ch of line) {
    if (ch === '"') inQ = !inQ;
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += ch;
  }
  result.push(cur);
  return result;
}

function cargarCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').filter(l => l.trim());
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
    const grupos = {};
    for (let i = 1; i < lines.length; i++) {
      const vals = parseCSVLine(lines[i]);
      const row = {};
      headers.forEach((h, idx) => { row[h] = (vals[idx]||'').replace(/"/g,'').trim(); });
      const g = row['Grupo'] || row['grupo'];
      if (!g) continue;
      if (!grupos[g]) grupos[g] = [];
      grupos[g].push(row);
    }
    datosActuales = [];
    for (const [grupo, miembros] of Object.entries(grupos)) {
      const rep = miembros.find(m => m['Boletos'] && m['Boletos'] !== '') || miembros[0];
      datosActuales.push({
        grupo,
        nombre: rep['Nombre Corto'] || rep['Nombre Invitado'] || `Grupo ${grupo}`,
        boletos: rep['Boletos'] || miembros.length,
        habitacion: rep['Habitación'] || rep['Habitacion'] || '',
        mesa: rep['Número de Mesa'] || rep['Numero de Mesa'] || 'Por asignar',
        respuesta: rep['Respuesta'] || ''
      });
    }
    generarQRs();
  };
  reader.readAsText(file, 'UTF-8');
}

function generarQRs() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const grid = document.getElementById('qrGrid');
  grid.innerHTML = '';
  Object.keys(canvasMap).forEach(k => delete canvasMap[k]);

  const datos = datosActuales.length > 0 ? datosActuales : DATOS_DEMO;

  if (!baseUrl || baseUrl.includes('tuusuario')) {
    alert('⚠️ Primero ingresa la URL real de tu app en GitHub Pages.');
    return;
  }

  document.getElementById('contador').textContent = `${datos.length} invitados / grupos encontrados`;
  document.getElementById('dlTodosBtn').style.display = 'flex';

  datos.forEach(inv => {
    const card = document.createElement('div');
    card.className = 'qr-card';

    const mesaTxt = (!inv.mesa || inv.mesa.toLowerCase().includes('pendiente')) ? 'Por asignar' : inv.mesa;
    const qrUrl = baseUrl + encodeURIComponent(inv.nombre);
    const qrDivId = `qr-${inv.grupo}`;

    card.innerHTML = `
      <div class="nombre">${inv.nombre}</div>
      <div class="meta">Grupo ${inv.grupo}</div>
      <div class="qr-wrap" id="${qrDivId}"></div>
      <div class="data-row"><span class="dk">🪑 Mesa</span><span class="dv">${mesaTxt}</span></div>
      <div class="data-row"><span class="dk">🏨 Habitación</span><span class="dv">${inv.habitacion || '—'}</span></div>
      <div class="data-row"><span class="dk">🎟️ Boletos</span><span class="dv">${inv.boletos}</span></div>
      <div class="data-row"><span class="dk">✅ Estado</span><span class="dv">${inv.respuesta || '—'}</span></div>
      <button class="dl-btn" id="dlbtn-${inv.grupo}">⏳ Preparando…</button>
    `;
    grid.appendChild(card);

    // Generar QR y cuando esté listo componer imagen
    const qrDiv = document.getElementById(qrDivId);
    const qrObj = new QRCode(qrDiv, {
      text: qrUrl,
      width: 180,
      height: 180,
      colorDark: '#1A1410',
      colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.M
    });

    // El canvas tarda ~100ms en renderizarse
    setTimeout(() => {
      const qrCanvas = qrDiv.querySelector('canvas');
      if (!qrCanvas) return;
      const composed = generarImagenConNombre(qrCanvas, inv.nombre, inv.grupo);
      canvasMap[inv.grupo] = { canvas: composed, nombre: inv.nombre };

      const btn = document.getElementById(`dlbtn-${inv.grupo}`);
      btn.textContent = `⬇ Descargar QR de ${inv.nombre}`;
      btn.onclick = () => descargarCanvas(composed, inv.nombre);
    }, 400);
  });
}

async function descargarTodos() {
  const claves = Object.keys(canvasMap);
  if (claves.length === 0) { alert('Primero genera los QR.'); return; }

  const btn = document.getElementById('dlTodosBtn');
  btn.textContent = '⏳ Descargando…';
  btn.disabled = true;

  // Descargar uno por uno con pequeña pausa para no saturar el navegador
  for (let i = 0; i < claves.length; i++) {
    const { canvas, nombre } = canvasMap[claves[i]];
    descargarCanvas(canvas, nombre);
    await new Promise(r => setTimeout(r, 350));
  }

  btn.textContent = `✅ ¡Listos! ${claves.length} archivos`;
  setTimeout(() => {
    btn.textContent = '⬇ Descargar todos';
    btn.disabled = false;
  }, 3000);
}
</script>
</body>
</html>
